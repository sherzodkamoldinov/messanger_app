name: chat_app
description: A new Flutter project.

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=2.18.5 <3.0.0'

# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. =
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  firebase_core: ^2.3.0
  firebase_auth: ^4.1.5
  cloud_firestore: ^4.1.0
  firebase_storage: ^11.0.6
  firebase_messaging: ^14.1.3
  google_sign_in: ^5.1.1

  fluttertoast: ^8.0.8
  image_picker: ^0.8.4+2
  shared_preferences: ^2.0.8
  intl: ^0.17.0
  flutter_local_notifications: ^12.0.4
  photo_view: ^0.14.0
  provider: ^6.0.1
  country_code_picker: ^2.0.2
  url_launcher: ^6.0.12
  

  lottie: ^2.0.0
  change_app_package_name: ^1.1.0
  flutter_svg: ^1.1.6

  font_awesome_flutter: ^10.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:

 
  uses-material-design: true

  
  assets:
    - assets/images/
    - assets/lottie/
    - assets/svg/
    - assets/svg/types/

  
